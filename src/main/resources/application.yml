server:
  port: 8080
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
    include-exception: false

spring:
  datasource:
    url: jdbc:postgresql://localhost:5555/eventpilot
    driver-class-name: org.postgresql.Driver
  main:
    web-application-type: servlet
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    show-sql: false
  data:
    redis:
      repositories:
        enabled: false

cache:
  redis:
    host: localhost
    port: 6379

security:
  jwt:
    secret: ${JWT_SECRET}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
    allowed-methods: ${CORS_ALLOWED_METHODS:GET,POST,PUT,PATCH,DELETE,OPTIONS}
    allowed-headers: ${CORS_ALLOWED_HEADERS:Authorization,Content-Type}
    exposed-headers: ${CORS_EXPOSED_HEADERS:Authorization}

discord:
  token: ${DISCORD_BOT_TOKEN}
  commands:
    folder: commands
  scheduler:
    interval-seconds: 60
