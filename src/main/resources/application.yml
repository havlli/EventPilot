server:
  port: 8080
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
    include-exception: false

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5555/${POSTGRES_DB:eventpilot}}
    username: ${SPRING_DATASOURCE_USERNAME:${POSTGRES_USER:eventpilot}}
    password: ${SPRING_DATASOURCE_PASSWORD:${POSTGRES_PASSWORD:eventpilot}}
    driver-class-name: org.postgresql.Driver
  main:
    web-application-type: servlet
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    show-sql: false
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      repositories:
        enabled: false

security:
  jwt:
    secret: ${JWT_SECRET}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
    allowed-methods: ${CORS_ALLOWED_METHODS:GET,POST,PUT,PATCH,DELETE,OPTIONS}
    allowed-headers: ${CORS_ALLOWED_HEADERS:Authorization,Content-Type}
    exposed-headers: ${CORS_EXPOSED_HEADERS:Authorization}

discord:
  token: ${DISCORD_BOT_TOKEN}
  commands:
    folder: commands
  scheduler:
    interval-seconds: ${DISCORD_SCHEDULER_INTERVAL_SECONDS:60}
    reminder-lead-minutes: ${DISCORD_REMINDER_LEAD_MINUTES:60}
