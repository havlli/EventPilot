name: eventpilot
services:
  eventpilot:
    container_name: eventpilot-app
    image: havlli/eventpilot:latest
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://database:5432/eventpilot
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:?Set POSTGRES_USER in .env}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      CACHE_REDIS_HOST: cache
      DISCORD_BOT_TOKEN: your-discord-bot-token
      JWT_SECRET: at-least-256bits-HS256-compliant-secret
    ports:
      - 8080:8080
    depends_on:
      - database
      - cache
  database:
    container_name: eventpilot-postgres
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB in .env}
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - database:/data/postgres
    ports:
      - 5554:5432
    restart: unless-stopped
  cache:
    container_name: eventpilot-redis
    image: redis:7-alpine
    hostname: cache
    ports:
      - 6378:6379
    restart: unless-stopped

volumes:
  database:
